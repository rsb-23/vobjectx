site_name: VObjectX
site_description: A full-featured Python3 package for parsing and creating iCalendar and vCard files
site_author: Rishabh B
repo_url: https://github.com/rsb-23/vobjectx
repo_name: rsb-23/vobjectx
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: default
      primary: deep purple
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            separate_signature: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
      - Overview: api/index.md
      - vobjectx: api/vobjectx.md
      - vobjectx.ical: api/vobjectx/ical.md
      - vobjectx.datatypes: api/vobjectx/datatypes.md
      - vobjectx.helper: api/vobjectx/helper.md

extra:
  generator: false
